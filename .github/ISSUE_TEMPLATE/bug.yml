name: Bug report
description: Report a reproducible software or website problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Do not include credentials, private data, row-level outputs, or sensitive filesystem paths."
  - type: textarea
    id: summary
    attributes:
      label: Problem
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Exact command or route
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and safe logs
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Git commit
      placeholder: Full commit SHA
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python or Node version, device, and package versions.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: I removed credentials, private data, and sensitive paths.
          required: true
